name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-mcp-server:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests (no DB required)
        run: uv run pytest tests/ -v -m "not integration" --tb=short

  test-agents:
    name: Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/ -v -m "not integration" --tb=short

  eval-smoke:
    name: Eval Harness Smoke Test
    runs-on: ubuntu-latest
    needs: [test-agents]
    defaults:
      run:
        working-directory: agents
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run eval smoke test
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python -m agents.eval.eval_harness --smoke
          else
            echo "ANTHROPIC_API_KEY not set — skipping eval smoke test (expected in forks without secrets)"
          fi

  lint:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Check mcp-server imports
        run: |
          cd mcp-server && uv sync && uv run python -c "from mcp_server.middleware.auth import require_auth; print('mcp-server: OK')"

      - name: Check agents imports
        run: |
          cd agents && uv sync && uv run python -c "from agents.main import app; print('agents: OK')"
