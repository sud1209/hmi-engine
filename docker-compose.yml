version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hmi
      POSTGRES_PASSWORD: hmi
      POSTGRES_DB: hmi
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    restart: unless-stopped
    command: uv run uvicorn mcp_server.main:app --host 0.0.0.0 --port 8001
    environment:
      - DATABASE_URL=postgresql+asyncpg://hmi:hmi@postgres:5432/hmi
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8501,http://localhost:3000}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - API_KEY_HASH=${API_KEY_HASH:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - KPI_IMPORT_PATH=${KPI_IMPORT_PATH:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  agent-runner:
    build:
      context: .
      dockerfile: agents/Dockerfile
    restart: unless-stopped
    environment:
      - MCP_SERVER_URL=http://mcp-server:8001/sse
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CHROMA_PATH=/app/data/chroma
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - chroma-data:/app/data/chroma
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MCP_API=http://mcp-server:8001
      - AGENT_API=http://agent-runner:8000
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:3000/api/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mcp-server
      - agent-runner
      - dashboard
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  pg-data:
  chroma-data:
  caddy-data:
  caddy-config:
